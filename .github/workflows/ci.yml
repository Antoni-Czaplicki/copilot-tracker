name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the shared package first so its declaration files exist; the web
      # app's type-aware lint/typecheck rules resolve @copilot-tracker/shared
      # from dist.
      - name: Build shared package
        run: pnpm --filter @copilot-tracker/shared build

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test web app
        run: pnpm --filter @copilot-tracker/web test
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/copilot_tracker
          NEXT_PUBLIC_APP_URL: https://copilot-tracker.example.com
          AZURE_DEVOPS_CLIENT_ID: placeholder-client-id
          AZURE_DEVOPS_CLIENT_SECRET: placeholder-client-secret
          AZURE_DEVOPS_ORG: placeholder-org
          COPILOT_TRACKER_TOKEN_ENCRYPTION_KEY: placeholder-token-encryption-key

      - name: Build web app
        run: pnpm --filter @copilot-tracker/web build
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/copilot_tracker
          NEXT_PUBLIC_APP_URL: https://copilot-tracker.example.com
          AZURE_DEVOPS_CLIENT_ID: placeholder-client-id
          AZURE_DEVOPS_CLIENT_SECRET: placeholder-client-secret
          AZURE_DEVOPS_ORG: placeholder-org
          COPILOT_TRACKER_TOKEN_ENCRYPTION_KEY: placeholder-token-encryption-key

  test-extension:
    name: Extension tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The VS Code integration tests launch an Electron instance, which needs a
      # virtual framebuffer on headless CI.
      - name: Run extension tests
        run: xvfb-run -a pnpm test
