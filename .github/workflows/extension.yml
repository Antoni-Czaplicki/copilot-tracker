name: Build extension

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "apps/extension/**"
      - "packages/**"
      - ".github/workflows/extension.yml"
  workflow_dispatch:

concurrency:
  group: extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile extension
        run: pnpm --filter copilot-tracker compile

      - name: Package VSIX
        working-directory: apps/extension
        run: pnpm exec vsce package --no-dependencies --out copilot-tracker.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-tracker-vsix
          path: apps/extension/copilot-tracker.vsix
          if-no-files-found: error

      # On a version tag, attach the VSIX to a GitHub Release and, if a
      # marketplace token is configured, publish it.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/extension/copilot-tracker.vsix
          generate_release_notes: true

      # Marketplace publishing is intentionally disabled for now. To enable it,
      # add a VSCE_PAT repository secret and uncomment the step below; it then
      # runs on version tags only.
      # - name: Publish to VS Code Marketplace
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   working-directory: apps/extension
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: pnpm exec vsce publish --no-dependencies --packagePath copilot-tracker.vsix
