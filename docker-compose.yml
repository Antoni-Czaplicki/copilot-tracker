services:
  postgres:
    image: postgres:18-alpine
    container_name: copilot-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: copilot_tracker
      POSTGRES_PASSWORD: copilot_tracker
      POSTGRES_DB: copilot_tracker
    ports:
      - "54329:5432"
    volumes:
      - copilot_tracker_postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot_tracker -d copilot_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  copilot_tracker_postgres:
